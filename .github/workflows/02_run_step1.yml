name: "2. Execute Step 1 (Macro)"
on:
  workflow_dispatch:

jobs:
  step1-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download T7 Artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: 01_t7_download.yml
          name: t7-state-artifact
          path: data/state/

      - name: Execute Step 1 Model
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/02_run_step1.py --shard ${{ matrix.shard }} --total 3

      - name: Upload Step 1 State Artifact
        uses: actions/upload-artifact@v4
        with:
          name: step1-state-shard-${{ matrix.shard }}
          path: |
            data/state/step1_passed_shard_${{ matrix.shard }}.csv
            data/state/step1_dates_shard_${{ matrix.shard }}.json
          retention-days: 7
          
      - name: Upload Step 1 Outputs
        uses: actions/upload-artifact@v4
        with:
          name: step1-outputs-shard-${{ matrix.shard }}
          path: |
            outputs/predictions/
            outputs/diagnostics/
          retention-days: 7
