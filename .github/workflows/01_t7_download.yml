name: "1. T7 Download (Initialization)"
on:
  workflow_dispatch:

jobs:
  t7-download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run T7 Extraction
        run: python scripts/01_run_t7.py

      - name: Upload Qualified Tickers Artifact
        uses: actions/upload-artifact@v4
        with:
          name: t7-state-artifact
          path: data/state/qualified_tickers.csv
          retention-days: 7

      - name: Commit and Push T7 Dump and Qualified Tickers
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/state/qualified_tickers.csv data/raw/t7-xetr-allTradableInstruments.csv
          git commit -m "chore: Auto-update T7 dump and qualified tickers" || echo "No changes to commit"
          git push
