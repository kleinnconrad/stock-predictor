name: "3. Execute Step 2 (Fundamentals)"
on:
  workflow_dispatch:

jobs:
  step2-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download Step 1 Artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: 02_run_step1.yml
          path: artifacts_temp/

      - name: Move artifacts to state
        run: |
          mkdir -p data/state outputs/predictions outputs/diagnostics
          find artifacts_temp/step1-state-shard-*/ -type f -exec cp {} data/state/ \;
          find artifacts_temp/step1-outputs-shard-*/predictions/ -type f -exec cp {} outputs/predictions/ \;
          find artifacts_temp/step1-outputs-shard-*/diagnostics/ -type f -exec cp {} outputs/diagnostics/ \;

      - name: Execute Step 2 Model
        run: python scripts/03_run_step2.py --shard ${{ matrix.shard }} --total 3

      - name: Upload Final Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: step2-final-shard-${{ matrix.shard }}
          path: |
            data/processed/final_buy_signals_shard_${{ matrix.shard }}.csv
            outputs/predictions/
            outputs/diagnostics/
          retention-days: 7

  consolidate-and-commit:
    needs: step2-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all Step 2 Shard Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: step2-final-shard-*
          path: step2_artifacts
          merge-multiple: true

      - name: Consolidate Shards
        run: |
          mkdir -p data/processed
          echo "Ticker" > data/processed/final_buy_signals.csv
          find step2_artifacts/data/processed/ -name "final_buy_signals_shard_*.csv" -exec awk 'FNR>1' {} + >> data/processed/final_buy_signals.csv
          
          python -c '
          import os, json, glob
          payloads = []
          for f in glob.glob("step2_artifacts/outputs/predictions/*.json"):
              try:
                  with open(f, "r") as file:
                      payloads.append(json.load(file))
              except Exception as e:
                  print(f"Failed to read {f}: {e}")
          with open("data/processed/full_batch_report.json", "w") as out:
              json.dump(payloads, out, indent=2)
          '

      - name: Commit and Push Final Buy Signals
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/processed/final_buy_signals.csv data/processed/full_batch_report.json
          git commit -m "chore: Auto-update final results and JSON batch report" || echo "No changes to commit"
          git push
